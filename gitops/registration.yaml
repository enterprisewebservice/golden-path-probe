# Registers golden-path-probe's MCP tools with the gateway broker (discovery via
# tools/list; per-call routing through the HTTPRoute). credentialRef mirrors
# projectboard-mcp: the broker requires an Authorization value for its
# discovery connection even for backends that need no credential of their own.
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: golden-path-probe
  namespace: agent-office
  labels:
    app.kubernetes.io/name: golden-path-probe
    app.kubernetes.io/component: registration
spec:
  toolPrefix: golden-path-probe_
  path: /mcp
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: golden-path-probe-route
  credentialRef:
    name: github-mcp-broker-token
    key: AUTHORIZATION
