apiVersion: apps/v1
kind: Deployment
metadata:
  name: golden-path-probe
  namespace: agent-office
  labels:
    app.kubernetes.io/name: golden-path-probe
    app.kubernetes.io/part-of: supply-chain-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: golden-path-probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golden-path-probe
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: golden-path-probe
          image: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/golden-path-probe:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: ORDERS_API_URL
              value: "http://orders-api:8080"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
